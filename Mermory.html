<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mermory Game</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="mermory.css">
</head>

<body class="min-vh-100">

    <!-- selection -->
    <div id="selection-screen" class="screen w-100 min-vh-100 d-flex align-items-center justify-content-center p-3">
        <div class="selection-container w-100 text-center">
            <h1>🧠 Memory Game</h1>
            <p class="subtitle">Choose your card theme to start playing</p>
            <div class="options-grid">
                <button class="option-btn" data-type="hp">
                    <span class="option-icon">⚡</span>
                    <span class="option-label">Harry Potter</span>
                    <span class="option-sub">Characters</span>
                </button>
                <button class="option-btn" data-type="dogs">
                    <span class="option-icon">🐶</span>
                    <span class="option-label">Dogs</span>
                    <span class="option-sub">Random breeds</span>
                </button>
                <button class="option-btn" data-type="flags">
                    <span class="option-icon">🌍</span>
                    <span class="option-label">Flags</span>
                    <span class="option-sub">World countries</span>
                </button>
                <button class="option-btn random-btn" data-type="random">
                    <span class="option-icon">🎲</span>
                    <span class="option-label">Surprise Me!</span>
                    <span class="option-sub">Random theme</span>
                </button>
            </div>
        </div>
    </div>

    <script src="mermory.js"></script>
</body>

</html>
