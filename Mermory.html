<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mermory Game</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="mermory.css">
</head>

<body class="min-vh-100">

    <!-- selection -->
    <div id="selection-screen" class="screen w-100 min-vh-100 d-flex align-items-center justify-content-center p-3">
        <div class="selection-container w-100 text-center">
            <h1>🧠 Memory Game</h1>
            <p class="subtitle">Choose your card theme to start playing</p>
            <div class="options-grid">
                <button class="option-btn" data-type="hp">
                    <span class="option-icon">⚡</span>
                    <span class="option-label">Harry Potter</span>
                    <span class="option-sub">Characters</span>
                </button>
                <button class="option-btn" data-type="dogs">
                    <span class="option-icon">🐶</span>
                    <span class="option-label">Dogs</span>
                    <span class="option-sub">Random breeds</span>
                </button>
                <button class="option-btn" data-type="flags">
                    <span class="option-icon">🌍</span>
                    <span class="option-label">Flags</span>
                    <span class="option-sub">World countries</span>
                </button>
                <button class="option-btn random-btn" data-type="random">
                    <span class="option-icon">🎲</span>
                    <span class="option-label">Surprise Me!</span>
                    <span class="option-sub">Random theme</span>
                </button>
            </div>
        </div>
    </div>

    <!-- loading -->
    <div id="loading-screen" class="screen hidden w-100 min-vh-100 d-flex align-items-center justify-content-center">
        <div class="text-center">
            <div class="spinner"></div>
            <p>Loading your game…</p>
        </div>
    </div>

    <!-- game -->
    <div id="game-screen" class="screen hidden w-100 min-vh-100 d-flex flex-column align-items-center p-3 gap-3">
        <div class="game-header d-flex align-items-center justify-content-between w-100 flex-wrap gap-2">
            <div class="stat d-flex flex-column align-items-center">
                <span class="stat-label">Moves</span>
                <span id="moves-count">0</span>
            </div>
            <h2 id="game-title" class="text-center mb-0">Memory Game</h2>
            <div class="d-flex align-items-center gap-3">
                <div class="stat d-flex flex-column align-items-center">
                    <span class="stat-label">Time</span>
                    <span id="timer">0:00</span>
                </div>
                <button id="restart-btn" class="btn btn-sm text-nowrap">↩ Restart</button>
                <button id="back-btn" class="btn btn-sm text-nowrap">☰ Menu</button>
            </div>
        </div>
        <div id="game-board" class="game-board w-100"></div>
    </div>

    <!-- win modal -->
    <div id="win-modal" class="modal hidden">
        <div class="modal-content text-center">
            <div class="win-emoji mb-2">🎉</div>
            <h2 class="mb-2">You Won!</h2>
            <p id="win-stats" class="mb-4 lh-base"></p>
            <div class="modal-buttons d-flex gap-3 justify-content-center">
                <button id="play-again-btn" class="btn fw-semibold">Play Again</button>
                <button id="change-theme-btn" class="btn fw-semibold">Change Theme</button>
            </div>
        </div>
    </div>

    <script src="mermory.js"></script>
</body>

</html>
